###################
### KEYBINDINGS ###
###################

$MOD = SUPER

$srcDir = ~/Scripts

$terminal = kitty
# $fileManager = thunar
$fileManager = nautilus
$browser = brave


# bind = $MOD SHIFT, B, exec, notify-send "Test Notification" "This is a dummy notification."
# bind = $MOD SHIFT, V, exec, pkill swaync && swaync & sleep 0.5 && notify-send "Test Notification" "This is a dummy notification." && swaync-client -t

bind = SUPER,Tab,cyclenext,

bind = $MOD+Shift, D, exec, discord --enable-features=UseOzonePlatform --ozone-platform=wayland
bind = $MOD, Return, exec, $terminal
bind = $MOD+Shift, Q, killactive,
bind = $MOD+Shift, M, exit,
bind = $MOD, E, exec, $fileManager
bind = $MOD, W, togglefloating,
# bind = $MOD, D, exec, rofi -show drun
bind = $MOD, D, exec, vicinae toggle


# bind = $MOD, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# OBS
bind = $MOD, F10, pass, class:^(com\.obsproject\.Studio)$
bind = $MOD, F11, pass, class:^(com\.obsproject\.Studio)$

bind = $MOD, A, exec, rofi -show window
bind = $MOD, C, exec, $browser
bind = $MOD, F, fullscreen
bind = $MOD, G, togglegroup
bind = $MOD, U, moveoutofgroup
#bind = $MOD, P, pseudo, # dwindle
# bind = $MOD, X, togglesplit # dwindle

bind = $MOD+Shift, P, exec, $srcDir/toggle.sh # toggle laptop monitor on/off
bind = Ctrl+Alt, W, exec, killall waybar || waybar # toggle waybar
bind = $MOD+Ctrl, L, exec, hyprlock
# bind = Ctrl+Alt, W, exec, hyprpanel -q; hyprpanel

# bind = $MOD+Shift, W, exec, $srcDir/wallpaper_switcher.sh

bind = $MOD, H, movefocus, l
bind = $MOD, L, movefocus, r
bind = $MOD, K, movefocus, u
bind = $MOD, J, movefocus, d

bind = Alt, l, changegroupactive, f
bind = Alt, h, changegroupactive, b

bind = Alt, Tab, changegroupactive, f
bind = Alt+Shift, Tab, changegroupactive, b

# Switch workspaces with MOD + [0-9]
bind = $MOD, 1, workspace, 1
bind = $MOD, 2, workspace, 2
bind = $MOD, 3, workspace, 3
bind = $MOD, 4, workspace, 4
bind = $MOD, 5, workspace, 5
bind = $MOD, 6, workspace, 6
bind = $MOD, 7, workspace, 7
bind = $MOD, 8, workspace, 8
bind = $MOD, 9, workspace, 9
bind = $MOD, 0, workspace, 10

# Move active window to a workspace with MOD + SHIFT + [0-9]
bind = $MOD SHIFT, 1, movetoworkspacesilent, 1
bind = $MOD SHIFT, 2, movetoworkspacesilent, 2
bind = $MOD SHIFT, 3, movetoworkspacesilent, 3
bind = $MOD SHIFT, 4, movetoworkspacesilent, 4
bind = $MOD SHIFT, 5, movetoworkspacesilent, 5
bind = $MOD SHIFT, 6, movetoworkspacesilent, 6
bind = $MOD SHIFT, 7, movetoworkspacesilent, 7
bind = $MOD SHIFT, 8, movetoworkspacesilent, 8
bind = $MOD SHIFT, 9, movetoworkspacesilent, 9
bind = $MOD SHIFT, 0, movetoworkspacesilent, 10

bind = $MOD, V, exec, vicinae vicinae://launch/clipboard/history


# SCREENSHOT
bind = $MOD SHIFT, S, exec, $srcDir/screenshot.sh sf # frozen screen screenshot
bind = $MOD, Print, exec, $srcDir/screenshot.sh m # monitor screenshot capture
bind = , Print, exec, $srcDir/screenshot.sh p # all monitors screenshot capture

# Example special workspace (scratchpad)
# bind = $MOD, S, togglespecialworkspace, magic
# bind = $MOD SHIFT, S, movetoworkspace, special:magic

# BRIGHTNESS CONTROL
bindel = , XF86MonBrightnessDown, exec, $srcDir/brightness_control.sh d
bindel = , XF86MonBrightnessUp, exec, $srcDir/brightness_control.sh i

# VOLUME CONTROL
bindel = , XF86AudioRaiseVolume, exec, $srcDir/volume_control.sh i 
bindel = , XF86AudioLowerVolume, exec, $srcDir/volume_control.sh d

# Scroll through existing workspaces with MOD + scroll
bind = $MOD, mouse_down, workspace, e-1
bind = $MOD, N, workspace, e-1
bind = $MOD, mouse_up, workspace, e+1
bind = $MOD, M, workspace, e+1

# Move/resize windows with MOD + LMB/RMB and dragging
bindm = $MOD, mouse:272, movewindow
bindm = $MOD, mouse:273, resizewindow
bindm = $MOD, Q, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# TOGGLE MICROPHONE
bind = $MOD, grave, exec, $srcDir/toggle_mute.sh

# Lock on lid open
# bindl=,switch:on:Lid Switch, exec, hyprlock --immediate
# Lock lid on close
bindl=,switch:off:Lid Switch, exec, hyprlock --immediate
# bind = $MOD SHIFT, L, exec, hyprlock --immediate 

bind = $MOD SHIFT, L, movewindow, r
bind = $MOD SHIFT, H, movewindow, l

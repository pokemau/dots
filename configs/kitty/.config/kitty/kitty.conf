include theme.conf

# linux_display_server wayland
linux_display_server x11
# wayland_titlebar_color background

# font_family      Hack
# font_family         MesloLGS Nerd Font Mono
font_family         Menlo Nerd Font Mono
#font_family         Cascadia Code
# font_family         SFMono Nerd Font Mono
#font_family        ComicMono
# font_family         FiraCode Nerd Font
# font_family         Ubuntu Mono Nerd Font
# font_family        Roboto Mono Nerd Font 
# bold_font           Ubuntu Mono Nerd Font Bold
# italic_font         Ubuntu Mono Nerd Font Italic
# bold_italic_font    Ubuntu Mono Nerd Font Bold Italic

# modify_font cell_height -1px
# modify_font cell_width -1px
font_size 10.6
disable_ligatures always
window_padding_width 1

cursor_text_color background
selection_foreground none
selection_background none
# background_opacity 0.9
selection_style=reverse
hide_window_decorations no
enable_audio_bell no
#confirm_os_window_close 0


# --- Scrolling Settings ---
# Multiplier for touchpad scrolling speed. 
touch_scroll_multiplier 30.0

# Optional: Multiplier for mouse wheel scrolling speed.
# wheel_scroll_multiplier 5.0

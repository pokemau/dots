[general]
live_config_reload = true

[font]
size = 11
# offset.x = -1
# offset.y = -1

[font.normal]
family = "Roboto Mono Nerd Font"
style = "semibold"

[window]
# opacity = 0.95
# title = "Terminal"
# startup_mode = "Windowed"
dimensions = { columns = 110, lines = 40 }
padding = { x = 2, y = 2 }
dynamic_title = true
# decorations = "none"

[cursor]
style = { blinking = "Always" }
blink_interval = 300

[colors]
draw_bold_text_with_bright_colors = true

